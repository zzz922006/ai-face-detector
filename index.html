<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision Pro - Final Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
       <style>
        :root { --primary: #00d4ff; --bg: #0f172a; --card: #1e293b; --accent: #22c55e; --danger: #ef4444; --warning: #f59e0b; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        .main-wrapper { display: flex; flex-direction: row; background: var(--card); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; overflow: hidden; max-width: 1300px; width: 95%; height: 90vh; }

        /* --- SIDEBAR ĐIỀU KHIỂN --- */
        .sidebar { width: 340px; padding: 25px; background: rgba(15, 23, 42, 0.7); border-right: 1px solid #475569; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        
        /* Chỉ số kết quả */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { background: #0f172a; padding: 12px; border-radius: 12px; border: 1px solid #334155; text-align: center; }
        .stat-value { display: block; font-size: 1.8rem; font-weight: 800; color: var(--primary); font-family: monospace; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        /* Box chức năng */
        .control-box { display: flex; flex-direction: column; gap: 8px; }
        .group-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; font-weight: bold; }
        .btn-group { display: flex; flex-direction: column; gap: 6px; }
        .btn-row { display: flex; gap: 6px; }
        
        button, label.upload-btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; background: #334155; color: #cbd5e1; transition: 0.2s; font-size: 13px; text-align: center; }
        button.active { background: var(--primary); color: #0f172a; box-shadow: 0 0 15px rgba(0,212,255,0.3); }

        #btn-toggle-cam { background: var(--danger); color: white; }
        #btn-toggle-cam.off { background: var(--accent); }

        /* Cảnh báo Engine Sâu */
        .engine-warning { background: rgba(245, 158, 11, 0.15); border: 1px solid var(--warning); color: var(--warning); padding: 10px; border-radius: 8px; font-size: 11px; line-height: 1.4; display: none; }

        /* Nút hành động chính */
        #btn-scan, #btn-take-photo { background: var(--accent); color: white; width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; margin-top: 10px; font-size: 15px; }

        /* --- KHU VỰC HIỂN THỊ --- */
        .display-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; background: #020617; }
        #media-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        video, img { max-width: 100%; max-height: 100%; border-radius: 12px; border: 2px solid #1e293b; }
        canvas { position: absolute; pointer-events: none; z-index: 5; }
        .mirror { transform: scaleX(-1); }

        /* Overlay khi đang quét */
        #scan-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; border-radius: 12px; }
        .spinner { width: 50px; height: 50px; border: 5px solid #1e293b; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #status-bar { font-size: 12px; padding: 10px; border-radius: 8px; background: #0f172a; border-left: 4px solid var(--primary); color: #cbd5e1; }
        .hidden { display: none !important; }
        h2 { font-size: 1.4rem; color: var(--primary); margin: 0; text-align: center; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar">
        <h2 style="color: var(--primary); text-align: center; margin: 0;">AI VISION PRO</h2>
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-value" id="fps-val">0</span>
                <span class="stat-label">FPS</span>
            </div>
            <div class="stat-box">
                <span class="stat-value" id="count-val">0</span>
                <span class="stat-label">Faces</span>
            </div>
        </div>
        <div id="status-bar"> Đang nạp hệ thống...</div>
        
        <div class="control-box">
            <span class="group-label">Engine Nhận Diện</span>
            <div class="btn-row">
                <button id="engine-ssd" class="active" style="flex:1">SSD (Nhanh)</button>
                <button id="engine-mtcnn" style="flex:1">MTCNN (Sâu)</button>
            </div>
            <div id="mtcnn-alert" class="engine-warning">⚠️ MTCNN rất nặng, FPS sẽ giảm.</div>
        </div>

        <div class="control-box">
            <span class="group-label">Nguồn dữ liệu</span>
            <div class="btn-group">
                <button id="mode-live" class="active"> Chế độ Live</button>
                <button id="mode-capture"> Chụp Webcam</button>
                <label class="upload-btn"> Tải ảnh file <input type="file" id="image-upload" accept="image/*" class="hidden"></label>
            </div>
        </div>

        <div class="control-box">
            <span class="group-label">Thiết bị</span>
            <button id="btn-toggle-cam"> Tắt Camera</button>
        </div>

        <div class="control-box">
            <span class="group-label">Cài đặt</span>
            <button id="opt-age" class="active"> Hiển thị Tuổi / Giới tính</button>
        </div>

        <div id="action-zone">
            <button id="btn-take-photo" class="hidden">XÁC NHẬN CHỤP ẢNH</button>
            <button id="btn-scan" class="hidden">BẮT ĐẦU PHÂN TÍCH</button>
        </div>
    </div>

    <div class="display-area">
        <div id="media-container">
            <div id="scan-overlay">
                <div class="spinner"></div>
                <span>Đang xử lý AI...</span>
            </div>
            <video id="video" width="640" height="480" autoplay muted class="mirror"></video>
            <img id="image-preview" class="hidden">
            <canvas id="overlay"></canvas>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const imagePreview = document.getElementById('image-preview');
    const statusBar = document.getElementById('status-bar');
    const btnScan = document.getElementById('btn-scan');
    const btnTakePhoto = document.getElementById('btn-take-photo');
    const btnToggleCam = document.getElementById('btn-toggle-cam');
    const canvas = document.getElementById('overlay');
    const scanOverlay = document.getElementById('scan-overlay');
    const fpsVal = document.getElementById('fps-val');
    const countVal = document.getElementById('count-val');
    const mtcnnAlert = document.getElementById('mtcnn-alert');
    
    let currentMode = 'live'; 
    let currentEngine = 'ssd';
    let localStream = null;
    let isCamOn = false;
    let isProcessing = false;
    let lastTime = 0;
    let requestID = null;

    // 1. KHỞI TẠO AI
    async function initAI() {
        try {
            const MODEL_URL = './models'; 
            statusBar.innerText = "📦 Đang tải Models...";
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceapi.nets.mtcnn.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
            ]);
            statusBar.innerText = "✅ Hệ thống sẵn sàng";
            await startWebcam();
        } catch (err) {
            statusBar.innerHTML = "<b style='color:red'>❌ Lỗi: Kiểm tra thư mục /models và Live Server!</b>";
            console.error(err);
        }
    }

    // 2. QUẢN LÝ CAMERA (FIXED)
    async function startWebcam() {
        try {
            if (localStream) return true; 

            statusBar.innerText = "📷 Đang kết nối camera...";
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 640, height: 480, facingMode: "user" } 
            });

            video.srcObject = localStream;
            
            return new Promise((resolve) => {
                video.onloadedmetadata = async () => {
                    await video.play();
                    isCamOn = true;
                    isProcessing = false; 
                    lastTime = 0;         
                    video.classList.remove('hidden');
                    updateCamUI(true);
                    statusBar.innerText = "✅ Camera đang hoạt động";
                    
                    // Khởi động lại vòng lặp nếu chưa chạy
                    if (!requestID) processFrame(); 
                    resolve(true);
                };
            });
        } catch (err) {
            statusBar.innerText = "❌ Lỗi: Không thể truy cập Camera.";
            return false;
        }
    }

    function stopWebcam() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        video.pause();
        video.srcObject = null;
        isCamOn = false;
        isProcessing = false; // Giải phóng trạng thái ngay lập tức
        updateCamUI(false);
        clearCanvas();
        
        if (requestID) {
            cancelAnimationFrame(requestID);
            requestID = null;
        }
    }

    function updateCamUI(on) {
        btnToggleCam.innerText = on ? "📷 Tắt Camera" : "📷 Bật Camera";
        btnToggleCam.className = on ? "" : "off";
    }

    function clearCanvas() {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        countVal.innerText = "0";
        fpsVal.innerText = "0";
    }

    // 3. VÒNG LẶP NHẬN DIỆN (SỬA LỖI TREO)
    async function processFrame() {
        // Nếu camera tắt hoặc không ở chế độ Live, xóa FPS và chờ
        if (!isCamOn || currentMode !== 'live' || video.readyState !== 4) {
            fpsVal.innerText = "0";
            lastTime = 0;
            requestID = requestAnimationFrame(processFrame);
            return;
        }

        if (!isProcessing) {
            isProcessing = true;
            try {
                // Tính FPS thực tế
                const now = performance.now();
                if (lastTime > 0) {
                    const delta = now - lastTime;
                    fpsVal.innerText = Math.round(1000 / delta);
                }
                lastTime = now;
                
                // Chạy AI
                await runAI(video);
            } catch (e) {
                console.warn("AI Frame Skip...");
            } finally {
                isProcessing = false;
            }
        }
        requestID = requestAnimationFrame(processFrame);
    }

    async function runAI(source) {
        if (!source || source.classList.contains('hidden') || source.readyState === 0) return;

        const displaySize = { 
            width: source.offsetWidth || source.width, 
            height: source.offsetHeight || source.height 
        };
        
        if (displaySize.width === 0 || displaySize.height === 0) return;
        
        // Đảm bảo canvas khớp với video thực tế
        if (canvas.width !== displaySize.width || canvas.height !== displaySize.height) {
            faceapi.matchDimensions(canvas, displaySize);
        }

        const options = currentEngine === 'ssd' 
            ? new faceapi.SsdMobilenetv1Options({ minConfidence: 0.5 })
            : new faceapi.MtcnnOptions({ minFaceSize: 50 });

        const detections = await faceapi.detectAllFaces(source, options)
            .withFaceLandmarks()
            .withAgeAndGender();

        const resizedResults = faceapi.resizeResults(detections, displaySize);
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        countVal.innerText = detections.length;

        resizedResults.forEach(result => {
            const { age, gender, detection } = result;
            let box = detection.box;
            
            // Xử lý tọa độ Mirror cho Webcam
            if (source instanceof HTMLVideoElement) {
                const x = displaySize.width - box.x - box.width;
                box = new faceapi.Rect(x, box.y, box.width, box.height);
            }

            const label = document.getElementById('opt-age').classList.contains('active') 
                ? `${Math.round(age)}t - ${gender === 'male' ? 'Nam' : 'Nữ'}` : "";
            
            new faceapi.draw.DrawBox(box, {
                label: label,
                boxColor: currentEngine === 'mtcnn' ? '#22c55e' : '#00d4ff'
            }).draw(canvas);
        });
    }

    // 4. SỰ KIỆN ĐIỀU KHIỂN (MODIFIED)
    function resetModeUI() {
        clearCanvas();
        video.classList.add('hidden');
        imagePreview.classList.add('hidden');
        btnScan.classList.add('hidden');
        btnTakePhoto.classList.add('hidden');
        document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
    }

    document.getElementById('mode-live').onclick = async (e) => {
        resetModeUI(); 
        currentMode = 'live';
        e.target.classList.add('active');
        if (isCamOn) {
            video.classList.remove('hidden');
        } else {
            await startWebcam();
        }
        statusBar.innerText = "✅ Chế độ Live";
    };

    document.getElementById('mode-capture').onclick = async (e) => {
        resetModeUI(); 
        currentMode = 'live';
        e.target.classList.add('active');
        if (isCamOn) {
            video.classList.remove('hidden');
        } else {
            await startWebcam();
        }
        btnTakePhoto.classList.remove('hidden');
        statusBar.innerText = "📸 Sẵn sàng chụp ảnh";
    };

    btnTakePhoto.onclick = () => {
        if (!isCamOn) return;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth; 
        tempCanvas.height = video.videoHeight;
        const tCtx = tempCanvas.getContext('2d');
        
        tCtx.translate(tempCanvas.width, 0);
        tCtx.scale(-1, 1);
        tCtx.drawImage(video, 0, 0);
        
        imagePreview.src = tempCanvas.toDataURL('image/png');
        currentMode = 'upload'; 
        video.classList.add('hidden');
        imagePreview.classList.remove('hidden');
        btnScan.classList.remove('hidden');
        btnTakePhoto.classList.add('hidden');
        clearCanvas();
        statusBar.innerText = "📸 Đã chụp. Nhấn Phân Tích.";
    };

    btnScan.onclick = async () => {
        scanOverlay.style.display = 'flex';
        // Delay nhẹ để UI spinner kịp hiện
        setTimeout(async () => {
            await runAI(imagePreview);
            scanOverlay.style.display = 'none';
        }, 100);
    };

    document.getElementById('image-upload').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            resetModeUI();
            currentMode = 'upload';
            imagePreview.src = URL.createObjectURL(file);
            imagePreview.onload = () => {
                imagePreview.classList.remove('hidden');
                btnScan.classList.remove('hidden');
                statusBar.innerText = "📂 Ảnh đã tải. Nhấn Phân Tích.";
            };
        }
    };

    btnToggleCam.onclick = async () => {
        if (isCamOn) {
            stopWebcam();
            video.classList.add('hidden');
            statusBar.innerText = "📷 Camera đã tắt";
        } else {
            await startWebcam();
            if (currentMode === 'live') video.classList.remove('hidden');
        }
    };

    document.getElementById('engine-ssd').onclick = (e) => {
        currentEngine = 'ssd';
        document.getElementById('engine-mtcnn').classList.remove('active');
        e.target.classList.add('active');
        mtcnnAlert.style.display = 'none';
        clearCanvas();
    };

    document.getElementById('engine-mtcnn').onclick = (e) => {
        currentEngine = 'mtcnn';
        document.getElementById('engine-ssd').classList.remove('active');
        e.target.classList.add('active');
        mtcnnAlert.style.display = 'block';
        clearCanvas();
    };

    document.getElementById('opt-age').onclick = (e) => e.target.classList.toggle('active');

    initAI();
</script>
</body>
</html>
